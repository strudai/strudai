version: "3.3"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - type: bind
        source: ./dist
        target: /usr/share/nginx/html
        read_only: true
      - type: bind
        source: ./dist-dev
        target: /usr/share/nginx/dev-html
        read_only: true
      - type: bind
        source: ./docker/nginx/default.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
      - type: bind
        source: ./ssl
        target: /etc/ssl/cloudflare
        read_only: true