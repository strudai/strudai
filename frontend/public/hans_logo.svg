<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">

  <!-- Strudel body: layered coiled pastry shape -->
  <!-- Outer coil -->
  <ellipse cx="100" cy="90" rx="85" ry="45" fill="#c8843a" stroke="#8B5E2A" stroke-width="2"/>
  <!-- Inner coil layer 1 -->
  <ellipse cx="100" cy="90" rx="65" ry="33" fill="#d4944a" stroke="#8B5E2A" stroke-width="1.5"/>
  <!-- Inner coil layer 2 -->
  <ellipse cx="100" cy="90" rx="45" ry="22" fill="#c8843a" stroke="#8B5E2A" stroke-width="1.5"/>
  <!-- Inner coil layer 3 -->
  <ellipse cx="100" cy="90" rx="27" ry="13" fill="#d4944a" stroke="#8B5E2A" stroke-width="1"/>
  <!-- Center nub -->
  <ellipse cx="100" cy="90" rx="12" ry="6" fill="#c8843a" stroke="#8B5E2A" stroke-width="1"/>

  
  <!-- Eyes (sitting on top of the strudel) -->
  <!-- Left eye white -->
  <ellipse cx="75" cy="58" rx="14" ry="14" fill="white" stroke="#5a3a1a" stroke-width="1.5"/>
  <!-- Right eye white -->
  <ellipse cx="125" cy="56
    " rx="16
    " ry="14" fill="white" stroke="#5a3a1a" stroke-width="1.5"/>
  <!-- Left pupil -->
  <circle cx="77" cy="59" r="7" fill="#2a1a0a"/>
  <!-- Right pupil -->
  <circle cx="130" cy="55
    " r="7" fill="#2a1a0a"/>
  <!-- Left eye shine -->
  <circle cx="80" cy="55" r="2.5" fill="white"/>
  <!-- Right eye shine -->
  <circle cx="134" cy="53" r="2.5" fill="white"/>

  <!-- Little smile -->
  <path d="M 88 105 Q 100 114 112 105" stroke="#5a3a1a" stroke-width="2" fill="none" stroke-linecap="round"/>

</svg>