<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StrudelGPT</title>
  <link rel="icon" href="/public/hans_logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/public/hans_logo.svg">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main>
    <div class="strudel-panel">
      <script src="https://unpkg.com/@strudel/repl@latest"></script>
      <script>
        const cdn = 'https://strudel.b-cdn.net';
        initStrudel({
          prebake: () => Promise.all([
            samples(`${cdn}/piano.json`, `${cdn}/piano/`, { prebake: true }),
            samples(`${cdn}/tidal-drum-machines.json`, `${cdn}/tidal-drum-machines/machines/`, { prebake: true, tag: 'drum-machines' }),
            samples(`${cdn}/vcsl.json`, `${cdn}/VCSL/`, { prebake: true }),
            samples(`${cdn}/uzu-drumkit.json`, `${cdn}/uzu-drumkit/`, { prebake: true, tag: 'drum-machines' }),
            samples(`${cdn}/Dirt-Samples.json`, `${cdn}/Dirt-Samples/`, { prebake: true }),
          ]),
        });
      </script>
      <strudel-editor id="strudelEditor">
        <!--
note("c a f e").sound("piano")
-->
      </strudel-editor>
    </div>
    <button class="console-toggle" id="consoleToggle">&gt;_ console</button>
    <div class="console-panel hidden" id="consolePanel">
      <div class="console-header">
        <span>&gt;_ console</span>
        <button id="consoleClose" title="Minimise">&#x2212;</button>
      </div>
      <div class="console-body" id="consoleBody"></div>
    </div>
    <button class="chat-toggle visible" id="chatToggle">
      <img src="/public/hans_logo.svg" alt="Chat" class="chat-toggle-icon" />
    </button>
    <div class="chat-panel hidden no-transition" id="chatPanel">
      <div class="chat-header">
        <button class="settings-btn" id="settingsBtn" title="Settings">&#x2699;</button>
        <button class="chat-close" id="chatClose">&times;</button>
      </div>
      <div class="settings-drawer" id="settingsDrawer">
        <div class="settings-drawer-inner">
          <label>
            <span>Model</span>
            <select id="modelSelect">
              <option value="claude-haiku-4-5-20251001" selected>Haiku</option>
              <option value="claude-sonnet-4-6">Sonnet</option>
              <option value="claude-opus-4-6">Opus</option>
            </select>
            <span class="info-hint"
              data-tooltip="Haiku — fast and cheap, good for simple patterns. Sonnet — balanced, better at complex tasks. Opus — most capable, best for tricky requests. Better models are more expensive.">i</span>
          </label>
          <label>
            <span>Performer model</span>
            <select id="performerModelSelect">
              <option value="claude-haiku-4-5-20251001" selected>Haiku</option>
              <option value="claude-sonnet-4-6">Sonnet</option>
              <option value="claude-opus-4-6">Opus</option>
            </select>
            <span class="info-hint"
              data-tooltip="Model used by the performer subagent during live sets. The performer executes the set plan autonomously — its tool calls appear in the console.">i</span>
          </label>
          <label>
            <span>API key</span>
            <span class="api-key-field" id="apiKeyField">
              <span class="api-key-mask" id="apiKeyMask"></span>
              <button id="apiKeyClearBtn">&times;</button>
              <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
              <button id="apiKeySaveBtn">Save</button>
            </span>
            <span class="info-hint"
              data-tooltip="Get your key at console.anthropic.com → API Keys.">i</span>
          </label>
          <label>
            <span>Auto-fix errors</span>
            <input type="checkbox" id="errorTriggerToggle" />
            <span class="info-hint"
              data-tooltip="When enabled, console errors automatically trigger an agent that reads the code and attempts to fix it. Tool calls appear in the console.">i</span>
          </label>
          <label>
            <span>Usage</span>
            <span class="usage-value" id="usageValue">0 tokens</span>
            <span class="info-hint"
              data-tooltip="Cumulative token usage and estimated cost for this session. Tracks all agents — chat, performer, and fixer. Resets on page reload.">i</span>
          </label>
        </div>
      </div>
      <div class="set-status-bar hidden" id="setStatusBar">
        <div class="set-status-info">
          <span class="set-status-label" id="setStatusLabel">Set active</span>
          <span class="set-status-section" id="setStatusSection"></span>
        </div>
        <div class="set-status-actions">
          <button class="set-plan-btn" id="setPlanBtn" title="View set">View set</button>
          <button class="set-stop-btn" id="setStopBtn" title="Interrupt set">Stop set</button>
        </div>
      </div>
      <div class="set-plan-overlay hidden" id="setPlanOverlay">
        <div class="set-plan-body" id="setPlanBody"></div>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="chat-message assistant">Guten Tag, I am Hans Strudel. Tell me vhat you vant to hear and I vill make
          ze beats.</div>
      </div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Describe a pattern..." autofocus />
        <button id="sendBtn" disabled>Send</button>
        <button id="stopBtn" class="hidden">Stop</button>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>

</html>
