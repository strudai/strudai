<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StrudelGPT</title>
  <link rel="icon" href="/public/hans_logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="theme.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-primary);
      background-image:
        linear-gradient(45deg, var(--bg-checker-alt) 25%, transparent 25%),
        linear-gradient(-45deg, var(--bg-checker-alt) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, var(--bg-checker-alt) 75%),
        linear-gradient(-45deg, transparent 75%, var(--bg-checker-alt) 75%);
      background-size: var(--checker-size) var(--checker-size);
      background-position:
        0 0,
        0 calc(var(--checker-size) / 2),
        calc(var(--checker-size) / 2) calc(var(--checker-size) / -2),
        calc(var(--checker-size) / -2) 0;
    }

    main {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* Strudel panel — fills available space */
    .strudel-panel {
      position: absolute;
      inset: 0;
      overflow: hidden;
      --background: #000000;
    }

    /* The <strudel-editor> inserts a sibling div for the CodeMirror editor */
    .strudel-panel>div {
      width: 100%;
      height: 100%;
    }

    /* Console panel — floating overlay at bottom-left */
    .console-panel {
      position: absolute;
      bottom: 1rem;
      left: 1rem;
      width: 420px;
      max-height: 200px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      z-index: 20;
      font-family: monospace;
      font-size: 0.78rem;
      transition: opacity var(--transition-speed) ease, transform var(--transition-speed) ease;
    }

    .console-panel.hidden {
      opacity: 0;
      transform: translateY(1rem);
      pointer-events: none;
      visibility: hidden;
    }

    .console-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.3rem 0.6rem;
      border-bottom: 1px solid var(--surface-border);
      color: var(--text-muted);
      font-size: 0.75rem;
      user-select: none;
    }

    .console-header button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0 0.25rem;
    }

    .console-header button:hover {
      color: var(--text-primary);
    }

    .console-body {
      flex: 1;
      overflow-y: auto;
      padding: 0.4rem 0.6rem;
    }

    .console-line {
      padding: 0.1rem 0;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text-secondary);
    }

    .console-line.error {
      color: #f87171;
    }

    .console-line.warn {
      color: #fbbf24;
    }

    .console-toggle {
      position: absolute;
      bottom: 1rem;
      left: 1rem;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius);
      color: var(--text-muted);
      cursor: pointer;
      font-family: monospace;
      font-size: 0.78rem;
      padding: 0.3rem 0.7rem;
      z-index: 20;
      transition: opacity var(--transition-speed) ease;
    }

    .console-toggle:hover {
      color: var(--text-primary);
    }

    .console-toggle.has-errors {
      color: #f87171;
      border-color: #f87171;
    }

    /* Chat panel — floating overlay on the right */
    .chat-panel {
      position: absolute;
      top: 1rem;
      right: 1rem;
      bottom: 1rem;
      width: 360px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transform: translateX(0);
      opacity: 1;
      transition:
        transform var(--transition-speed) ease,
        opacity var(--transition-speed) ease;
    }

    .chat-panel.hidden {
      transform: translateX(calc(100% + 1rem));
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }

    .chat-panel.no-transition {
      transition: none;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .chat-message {
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      max-width: 90%;
      line-height: 1.4;
      font-size: 0.9rem;
    }

    .chat-message.user {
      background: var(--bubble-user);
      color: var(--bubble-user-text);
      align-self: flex-end;
    }

    .chat-message.assistant {
      background: var(--bubble-assistant);
      color: var(--bubble-assistant-text);
      align-self: flex-start;
    }

    .chat-message.status {
      background: transparent;
      color: var(--text-muted);
      align-self: flex-start;
      font-size: 0.8rem;
      padding: 0.35rem 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .chat-message.tool-call {
      background: rgba(124, 92, 191, 0.12);
      border: 1px solid rgba(124, 92, 191, 0.25);
      color: var(--text-secondary);
      align-self: flex-start;
      font-size: 0.8rem;
      padding: 0.35rem 0.75rem;
      font-family: monospace;
    }

    .chat-message.tool-call .tool-name {
      color: var(--accent-hover);
      font-weight: 600;
    }

    .chat-message.tool-call .tool-status {
      color: var(--text-muted);
      font-style: italic;
    }

    .dot-pulse {
      display: inline-flex;
      gap: 3px;
    }

    .dot-pulse span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dot-pulse span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot-pulse span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes pulse {

      0%,
      80%,
      100% {
        opacity: 0.3;
        transform: scale(0.8);
      }

      40% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .chat-input-area {
      display: flex;
      padding: 0.75rem;
      gap: 0.5rem;
      border-top: 1px solid var(--surface-border);
      border-radius: 0 0 var(--radius) var(--radius);
    }

    .chat-input-area input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 0.375rem;
      font-size: 0.9rem;
      color: var(--text-primary);
      outline: none;
    }

    .chat-input-area input::placeholder {
      color: var(--text-muted);
    }

    .chat-input-area input:focus {
      border-color: var(--input-focus-border);
    }

    .chat-input-area button {
      padding: 0.5rem 1rem;
      background: var(--accent);
      color: var(--text-primary);
      border: none;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background var(--transition-speed) ease;
    }

    .chat-input-area button:hover {
      background: var(--accent-hover);
    }

    .chat-toggle {
      position: absolute;
      top: calc(1rem - 16px);
      right: calc(1rem - 5px);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: none;
      border: none;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition:
        transform var(--transition-speed) ease,
        opacity var(--transition-speed) ease;
    }

    .chat-toggle-icon {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .chat-toggle:hover {
      transform: scale(1.1);
    }

    .chat-toggle.visible {
      display: flex;
    }

    .chat-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.5rem;
      color: var(--text-muted);
      padding: 0.5rem 0.75rem;
      line-height: 1;
      transition: color var(--transition-speed) ease;
    }

    .chat-close:hover {
      color: var(--text-primary);
    }

    .chat-header {
      display: flex;
      justify-content: flex-end;
      padding: 0.25rem 0.25rem 0 0.25rem;
    }

    /* Ensure chat elements stay above the iframe */
    .chat-panel,
    .chat-toggle {
      z-index: 20;
      pointer-events: auto;
    }
  </style>
</head>

<body>
  <main>
    <div class="strudel-panel">
      <script src="https://unpkg.com/@strudel/repl@latest"></script>
      <script>
        const cdn = 'https://strudel.b-cdn.net';
        initStrudel({
          prebake: () => Promise.all([
            samples(`${cdn}/piano.json`, `${cdn}/piano/`, { prebake: true }),
            samples(`${cdn}/tidal-drum-machines.json`, `${cdn}/tidal-drum-machines/machines/`, { prebake: true, tag: 'drum-machines' }),
            samples(`${cdn}/vcsl.json`, `${cdn}/VCSL/`, { prebake: true }),
            samples(`${cdn}/uzu-drumkit.json`, `${cdn}/uzu-drumkit/`, { prebake: true, tag: 'drum-machines' }),
            samples(`${cdn}/Dirt-Samples.json`, `${cdn}/Dirt-Samples/`, { prebake: true }),
          ]),
        });
      </script>
      <strudel-editor id="strudelEditor">
        <!--
note("c a f e").sound("piano")
-->
      </strudel-editor>
    </div>
    <button class="console-toggle" id="consoleToggle">&gt;_ console</button>
    <div class="console-panel hidden" id="consolePanel">
      <div class="console-header">
        <span>&gt;_ console</span>
        <button id="consoleClose" title="Minimise">&#x2212;</button>
      </div>
      <div class="console-body" id="consoleBody"></div>
    </div>
    <button class="chat-toggle visible" id="chatToggle">
      <img src="/public/hans_logo.svg" alt="Chat" class="chat-toggle-icon" />
    </button>
    <div class="chat-panel hidden no-transition" id="chatPanel">
      <div class="chat-header">
        <button class="chat-close" id="chatClose">&times;</button>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="chat-message assistant">Hi I'm Hans Strudel. Let's make some tekno.
        </div>
      </div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Describe a pattern..." autofocus />
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </main>

  <script>
    // --- Console log interception ---
    const consoleBuffer = [];
    const consoleBody = document.getElementById('consoleBody');
    const consoleToggleBtn = document.getElementById('consoleToggle');
    const MAX_CONSOLE_LINES = 200;

    const origLog = console.log;
    const origError = console.error;
    const origWarn = console.warn;

    function appendConsoleLine(level, text) {
      consoleBuffer.push({ level, text });
      const line = document.createElement('div');
      line.className = `console-line ${level}`;
      line.textContent = text;
      consoleBody.appendChild(line);
      // Trim old lines
      while (consoleBody.children.length > MAX_CONSOLE_LINES) {
        consoleBody.firstChild.remove();
      }
      consoleBody.scrollTop = consoleBody.scrollHeight;
      // Highlight toggle button on errors
      if (level === 'error') {
        consoleToggleBtn.classList.add('has-errors');
      }
    }

    console.log = (...args) => { appendConsoleLine('log', args.join(' ')); origLog.apply(console, args); };
    console.error = (...args) => { appendConsoleLine('error', args.join(' ')); origError.apply(console, args); };
    console.warn = (...args) => { appendConsoleLine('warn', args.join(' ')); origWarn.apply(console, args); };

    // --- Console panel toggle ---
    const consolePanel = document.getElementById('consolePanel');
    const consoleClose = document.getElementById('consoleClose');

    consoleToggleBtn.addEventListener('click', () => {
      consolePanel.classList.remove('hidden');
      consoleToggleBtn.style.display = 'none';
      consoleToggleBtn.classList.remove('has-errors');
    });

    consoleClose.addEventListener('click', () => {
      consolePanel.classList.add('hidden');
      consoleToggleBtn.style.display = '';
    });

    // --- Chat UI ---
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    let statusEl = null;
    const toolCallEls = new Map(); // tool name -> element

    function addMessage(text, role) {
      removeStatus();
      const msg = document.createElement('div');
      msg.className = `chat-message ${role}`;
      msg.textContent = text;
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showStatus(label) {
      if (!statusEl) {
        statusEl = document.createElement('div');
        statusEl.className = 'chat-message status';
        chatMessages.appendChild(statusEl);
      }
      statusEl.innerHTML = `${label} <span class="dot-pulse"><span></span><span></span><span></span></span>`;
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function removeStatus() {
      if (statusEl) {
        statusEl.remove();
        statusEl = null;
      }
    }

    function showToolCall(toolName, input) {
      removeStatus();
      const el = document.createElement('div');
      el.className = 'chat-message tool-call';
      const inputStr = typeof input === 'object' ? JSON.stringify(input) : String(input);
      const truncated = inputStr.length > 80 ? inputStr.slice(0, 80) + '...' : inputStr;
      el.innerHTML = `<span class="tool-name">${toolName}</span> <span class="tool-status">running...</span>`;
      if (truncated && truncated !== '{}') {
        el.innerHTML += `<br>${truncated}`;
      }
      chatMessages.appendChild(el);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      toolCallEls.set(toolName, el);
    }

    function resolveToolCall(toolName) {
      const el = toolCallEls.get(toolName);
      if (el) {
        const statusSpan = el.querySelector('.tool-status');
        if (statusSpan) statusSpan.textContent = 'done';
        toolCallEls.delete(toolName);
      }
      // Show thinking again while waiting for next step
      showStatus('Thinking');
    }

    // --- WebSocket ---
    let ws;
    function connectWS() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}/ws`);

      ws.onopen = () => origLog('[ws] connected');

      ws.onmessage = (evt) => {
        const msg = JSON.parse(evt.data);

        if (msg.type === 'command') {
          handleCommand(msg);
        } else if (msg.type === 'event') {
          handleEvent(msg);
        }
      };

      ws.onclose = () => {
        origLog('[ws] disconnected, reconnecting in 2s...');
        setTimeout(connectWS, 2000);
      };
    }

    // --- Strudel editor helpers ---
    // The <strudel-editor> web component exposes .editor (a StrudelMirror instance).
    // editor.setCode(code) updates the CodeMirror document.
    // editor.evaluate() hot-swaps the pattern without stopping the scheduler.

    function getStrudelEditor() {
      return document.getElementById('strudelEditor')?.editor;
    }

    function getStrudelCode() {
      const editor = getStrudelEditor();
      return editor ? editor.code : '';
    }

    async function setStrudelCode(code) {
      const editor = getStrudelEditor();
      if (!editor) return false;
      editor.setCode(code);
      try {
        await editor.evaluate();
      } catch (err) {
        console.error('[strudel] evaluate failed:', err);
        return false;
      }
      return true;
    }

    // --- Command handlers (backend → frontend) ---
    async function handleCommand(msg) {
      let responseData = {};

      try {
        switch (msg.action) {
          case 'read_code':
            responseData = { code: getStrudelCode() };
            break;

          case 'update_code':
            if (msg.params?.code != null) {
              // Drain buffer so we only capture logs from this evaluation
              consoleBuffer.splice(0);
              const ok = await setStrudelCode(msg.params.code);
              const logs = consoleBuffer.splice(0);
              responseData = { ok, logs };
            } else {
              responseData = { ok: false, error: 'Missing code param' };
            }
            break;

          case 'read_console':
            responseData = { logs: consoleBuffer.splice(0) };
            break;

          default:
            responseData = { error: `Unknown action: ${msg.action}` };
        }
      } catch (err) {
        responseData = { ok: false, error: String(err) };
      }

      ws.send(JSON.stringify({ id: msg.id, type: 'response', data: responseData }));
    }

    // --- Event handlers (backend → frontend) ---
    function handleEvent(msg) {
      if (msg.event === 'agent_thinking') {
        showStatus('Thinking');
      } else if (msg.event === 'agent_tool_call') {
        showToolCall(msg.data.tool, msg.data.input);
      } else if (msg.event === 'agent_tool_result') {
        resolveToolCall(msg.data.tool);
      } else if (msg.event === 'chat_response') {
        removeStatus();
        toolCallEls.clear();
        addMessage(msg.data.text, 'assistant');
      }
    }

    // --- Send chat message via WebSocket ---
    function handleSend() {
      const text = chatInput.value.trim();
      if (!text) return;
      addMessage(text, 'user');
      chatInput.value = '';
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'event', event: 'chat_message', data: { text } }));
      }
    }

    sendBtn.addEventListener('click', handleSend);
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleSend();
    });

    // --- Chat panel toggle ---
    const chatPanel = document.getElementById('chatPanel');
    const chatToggle = document.getElementById('chatToggle');
    const chatClose = document.getElementById('chatClose');

    chatClose.addEventListener('click', () => {
      chatPanel.classList.add('hidden');
      setTimeout(() => chatToggle.classList.add('visible'), 200);
    });

    chatToggle.addEventListener('click', () => {
      chatPanel.classList.remove('no-transition');
      chatToggle.classList.remove('visible');
      chatPanel.classList.remove('hidden');
    });

    connectWS();
  </script>
</body>

</html>
