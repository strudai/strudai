server {
    listen 80;
    server_name strudai.com dev.strudai.com;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;

    return 444;
}

# Shared security headers — applied to all vhosts via include or copy.
# HSTS: tell browsers to only use HTTPS for 1 year, include subdomains.
# CSP: restricts script/style/connect sources to self + known CDNs.
#   script-src 'self' 'wasm-unsafe-eval' is required by Strudel (WebAssembly).
#   connect-src includes the Anthropic API endpoint used by the browser SDK.
# X-Content-Type-Options: prevents MIME sniffing.
# X-Frame-Options: blocks clickjacking iframes.
# Referrer-Policy: no referrer leakage to third parties.
# Permissions-Policy: disables browser features the app does not use.

map $host $security_headers_done {
    default 0;
}

server {
    listen 443 ssl;
    server_name strudai.com;

    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header X-Frame-Options            "DENY" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.anthropic.com; font-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache busted assets (Vite fingerprints filenames)
    location ~* \.(js|css|woff2|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Repeat security headers — add_header is not inherited when a
        # location block sets its own headers.
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff" always;
        add_header X-Frame-Options            "DENY" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.anthropic.com; font-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    }

    # Don't cache index.html itself
    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff" always;
        add_header X-Frame-Options            "DENY" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.anthropic.com; font-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    }
}

