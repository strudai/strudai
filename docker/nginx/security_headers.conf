# HSTS: tell browsers to only use HTTPS for 1 year, include subdomains.
# CSP: restricts script/style/connect sources to self + known CDNs.
#   script-src 'self' 'wasm-unsafe-eval' is required by Strudel (WebAssembly).
#   connect-src includes the Anthropic API endpoint used by the browser SDK.
# X-Content-Type-Options: prevents MIME sniffing.
# X-Frame-Options: blocks clickjacking iframes.
# Referrer-Policy: no referrer leakage to third parties.
# Permissions-Policy: disables browser features the app does not use.

add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options     "nosniff" always;
add_header X-Frame-Options            "DENY" always;
add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https://unpkg.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://api.anthropic.com https://openrouter.ai https://raw.githubusercontent.com https://felixroos.github.io https://SAZ71S8CLS-dsn.algolia.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
