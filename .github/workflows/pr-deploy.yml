name: PR Deploy

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Minimum permissions — no write access to repo contents or packages
permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Only run for PRs opened from within this repo, not from forks.
    # Fork PRs never have access to deployment secrets anyway, but this
    # prevents the build step from executing untrusted code on the runner.
    if: github.event.pull_request.head.repo.full_name == github.repository

    # Require manual approval from a maintainer before secrets are used.
    # Configure the "dev-preview" environment in:
    # GitHub → Settings → Environments → dev-preview → Required reviewers
    environment: dev-preview

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build
        run: npm install && npm run build

      # Copy built files to VM under /dev.strudai/
      - name: Upload dist
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "dist/,compose.yml,docker/"
          target: "/tmp/strudai-dev/"

      - name: Deploy
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            sudo rm -rf /strudai/dist-dev
            sudo mv /tmp/strudai-dev/dist /strudai/dist-dev
            sudo rm -rf /strudai/docker /strudai/compose.yml
            sudo mv /tmp/strudai-dev/docker /strudai/docker
            sudo mv /tmp/strudai-dev/compose.yml /strudai/compose.yml
            sudo rm -rf /tmp/strudai-dev
            cd /strudai
            sudo docker-compose -f compose.yml down
            sudo docker-compose -f compose.yml up -d
